name: Issue Helper Bot
 
on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled]
 
permissions:
  issues: write

 
jobs:
  reply-to-label:
    if: github.event.label.name == 'bug'
    runs-on: ubuntu-latest
    steps:
      - name: Post Comment using GitHub Script
        uses: actions/github-script@v7
        with:
          script: |
            const issueNumber = context.issue.number;
            const message = `👋 Hello @${context.actor}! Thanks for flagging this **bug**. 
            Our team has been notified and we will look into this as soon as possible. In the meantime, please ensure you have attached logs or screenshots!`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: message
            });
